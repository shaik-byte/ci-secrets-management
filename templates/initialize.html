<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initialize Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .init-card { width: 100%; max-width: 460px; border-radius: 16px; padding: 40px; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.25); }
    </style>
</head>
<body>
<div class="init-card">
    <h3 class="mb-3 text-center">Initialize Secure Vault</h3>
    <p class="text-muted">Choose how many Shamir shares to generate and how many are required to unseal.</p>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="totalShares" class="form-label">Total Shares</label>
            <input id="totalShares" name="total_shares" type="number" min="2" max="15" value="5" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="threshold" class="form-label">Unseal Threshold</label>
            <input id="threshold" name="threshold" type="number" min="2" max="15" value="3" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Generate Shares</button>
    </form>
</div>
</body>
</html>
