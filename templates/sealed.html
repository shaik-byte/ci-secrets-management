<!DOCTYPE html>
<html>
<head>
    <title>Vault Sealed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .sealed-card {
            max-width: 420px;
            padding: 40px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
        }

        .sealed-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="sealed-card">
    <div class="sealed-icon">🔒</div>
    <h3>Vault is Sealed</h3>
    <p class="text-muted">Please unseal the vault to continue.</p>

    <a href="{% url 'unseal' %}" class="btn btn-primary w-100 mt-3">
        🔑 Unseal Vault
    </a>
</div>

</body>
</html>
