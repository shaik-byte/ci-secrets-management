<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f2937, #111827);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 40px;
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        .login-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
        }

        .btn-primary {
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
        }

        .vault-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }

        .footer-text {
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="vault-icon">🔐</div>
    <h3 class="login-title">Secure Vault Login</h3>

    {% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label for="auth-method" class="form-label">Authentication Method</label>
            <select id="auth-method" name="auth_method" class="form-select">
                <option value="username_password" {% if selected_auth_method != "root_token" %}selected{% endif %}>Username / Password</option>
                <option value="root_token" {% if selected_auth_method == "root_token" %}selected{% endif %}>Root Token</option>
            </select>
        </div>

        <div id="username-password-fields">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       id="username-input"
                       name="username"
                       class="form-control"
                       placeholder="Enter username">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password"
                       id="password-input"
                       name="password"
                       class="form-control"
                       placeholder="Enter password">
            </div>
        </div>

        <div id="root-token-field" class="mb-4">
            <label class="form-label">Root Token</label>
            <input type="password"
                   id="root-token-input"
                   name="root_token"
                   class="form-control"
                   placeholder="Enter root token">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>
    </form>

    <div class="footer-text">
        Protected by Shamir Unseal + Encryption
    </div>

</div>

<script>
    function toggleAuthFields() {
        const methodSelect = document.getElementById("auth-method");
        const usernamePasswordFields = document.getElementById("username-password-fields");
        const rootTokenField = document.getElementById("root-token-field");
        const usernameInput = document.getElementById("username-input");
        const passwordInput = document.getElementById("password-input");
        const rootTokenInput = document.getElementById("root-token-input");

        if (!methodSelect) return;

        const usingRootToken = methodSelect.value === "root_token";
        if (usernamePasswordFields) usernamePasswordFields.style.display = usingRootToken ? "none" : "block";
        if (rootTokenField) rootTokenField.style.display = usingRootToken ? "block" : "none";

        if (usernameInput) usernameInput.required = !usingRootToken;
        if (passwordInput) passwordInput.required = !usingRootToken;
        if (rootTokenInput) rootTokenInput.required = usingRootToken;
    }

    document.addEventListener("DOMContentLoaded", function () {
        const methodSelect = document.getElementById("auth-method");
        if (methodSelect) {
            methodSelect.addEventListener("change", toggleAuthFields);
        }
        toggleAuthFields();
    });
</script>

</body>
</html>
