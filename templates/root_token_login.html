<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Root Token Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #1f2937, #111827); height:100vh; display:flex; align-items:center; justify-content:center;">
<div class="card p-4" style="width:100%; max-width:420px; border-radius:16px;">
    <h3 class="text-center mb-3">Vault Root Token Login</h3>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Root Token</label>
            <input type="password" name="root_token" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Authenticate Root</button>
    </form>
    <a class="btn btn-link mt-2" href="{% url 'login' %}">Back to username/password login</a>
</div>
</body>
</html>
