<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unseal Vault</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .unseal-card {
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 40px;
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
        }

        .vault-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .btn-unseal {
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
        }

        .status-message {
            margin-top: 15px;
            font-size: 14px;
        }

        .footer-text {
            font-size: 13px;
            margin-top: 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="unseal-card">

    <div class="vault-icon">🔐</div>
    <h3 class="mb-3">Vault is Sealed</h3>
    <p class="text-muted mb-4">Authenticate with your registered passkey to unseal.</p>

    <button id="unsealBtn"
            onclick="authenticateDevice()"
            class="btn btn-primary w-100 btn-unseal">
        🔑 Unseal Vault
    </button>

    <div id="status" class="status-message"></div>

    <div class="footer-text">
        Secured with WebAuthn
    </div>

</div>


<script>
async function authenticateDevice() {

    const statusDiv = document.getElementById("status");
    const btn = document.getElementById("unsealBtn");

    try {

        btn.disabled = true;
        btn.innerText = "Authenticating...";
        statusDiv.innerHTML = '<div class="text-muted">Waiting for passkey...</div>';

        const resp = await fetch("/begin-auth/", {
            credentials: "include"
        });

        const options = await resp.json();

        function base64UrlToUint8Array(base64Url) {
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const padding = '='.repeat((4 - base64.length % 4) % 4);
            base64 += padding;
            return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        }

        options.challenge = base64UrlToUint8Array(options.challenge);

        if (options.allowCredentials) {
            options.allowCredentials = options.allowCredentials.map(cred => ({
                ...cred,
                id: base64UrlToUint8Array(cred.id)
            }));
        }

        const assertion = await navigator.credentials.get({
            publicKey: options
        });

        function toBase64(buffer) {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }

        const authData = {
            id: assertion.id,
            rawId: toBase64(assertion.rawId),
            type: assertion.type,
            response: {
                authenticatorData: toBase64(assertion.response.authenticatorData),
                clientDataJSON: toBase64(assertion.response.clientDataJSON),
                signature: toBase64(assertion.response.signature),
                userHandle: assertion.response.userHandle
                    ? toBase64(assertion.response.userHandle)
                    : null
            }
        };

        const finishResp = await fetch("/finish-auth/", {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(authData)
        });

        const result = await finishResp.json();

        if (result.status === "unsealed") {
            statusDiv.innerHTML = '<div class="text-success">Vault Unsealed ✔ Redirecting...</div>';
            setTimeout(() => {
                window.location.href = "/";
            }, 800);
        } else {
            throw new Error(result.error);
        }

    } catch (error) {

        btn.disabled = false;
        btn.innerText = "🔑 Unseal Vault";

        statusDiv.innerHTML =
            '<div class="alert alert-danger mt-3">Authentication Failed: ' +
            error.message +
            '</div>';
    }
}
</script>

</body>
</html>
