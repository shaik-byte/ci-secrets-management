<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unseal Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .unseal-card { width: 100%; max-width: 500px; border-radius: 16px; padding: 40px; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.25); }
    </style>
</head>
<body>
<div class="unseal-card">
    <h3 class="mb-3 text-center">Vault is Sealed</h3>
    <p class="text-muted">Submit Shamir unseal shares. Required: <strong>{{ threshold }}</strong>. Submitted this session: <strong>{{ submitted_count }}</strong>.</p>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="share" class="form-label">Unseal Share</label>
            <input id="share" name="share" type="text" class="form-control" placeholder="example: 1-aabbcc..." required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Submit Share</button>
    </form>
</div>
</body>
</html>
