<!DOCTYPE html>
<html>
<head>
    <title>Notification Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📧 Notification Settings</h2>
        <a href="/" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
    </div>

    <div class="card p-4 shadow-sm">

        <form method="POST" action="{% url 'save_notification_config' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">From Email</label>
                <input type="email" name="from_email"
                       class="form-control"
                       value="{{ config.from_email }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">To (Comma Separated)</label>
                <textarea name="to_email" class="form-control" required>{{ config.to_email }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">CC</label>
                <textarea name="cc_email" class="form-control">{{ config.cc_email }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">BCC</label>
                <textarea name="bcc_email" class="form-control">{{ config.bcc_email }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Gmail App Password</label>
                <input type="password"
                       name="app_password"
                       class="form-control"
                       {% if not has_app_password %}required{% endif %}
                       placeholder="{% if has_app_password %}Saved securely. Enter only to replace.{% else %}Enter Gmail App Password{% endif %}">
                {% if has_app_password %}
                <div class="form-text text-success">A password is already stored securely. Leave blank to keep current password.</div>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Save Configuration
            </button>

        </form>

    </div>

</div>

</body>
</html>
